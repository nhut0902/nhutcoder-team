# Cloudflare Pages configuration for Next.js
# No wrangler.toml needed — Cloudflare Pages uses dashboard settings.
# This file is kept only for D1 database bindings when running locally.

name = "nhutcoder-team"
compatibility_date = "2025-07-01"
compatibility_flags = ["nodejs_compat"]

# D1 database binding (used by API routes at runtime)
[[d1_databases]]
binding = "DB"
database_name = "nhutcoder-team-db"
database_id = "local"

# R2 bucket for image uploads
[[r2_buckets]]
binding = "R2"
bucket_name = "nhutcoder-images"

# KV for caching
[[kv_namespaces]]
binding = "CACHE"
id = "local"
